<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paquito - Tienda Component</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
<style>
  :root {
    --bg:        rgba(10,11,16,0.82);
    --bg2:       rgba(20,22,30,0.88);
    --bg3:       rgba(28,30,40,0.92);
    --border:    rgba(255,255,255,0.08);
    --accent:    #f5c97a;
    --accent2:   #e8956d;
    --green:     #7ecfa0;
    --text:      rgba(255,240,210,0.95);
    --text-dim:  rgba(255,220,170,0.55);
    --font:      'Fredoka', sans-serif;
    --font-body: 'Nunito', sans-serif;
    --r:         10px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: var(--font-body);
    color: var(--text);
    font-size: 13px;
  }

  /* ── COLLAPSED STATE: solo un botón flotante ── */
  #toggle-btn {
    position: fixed;
    top: 10px;
    left: 10px;
    background: var(--bg2);
    border: 1px solid rgba(245,201,122,0.3);
    border-radius: 99px;
    padding: 5px 12px 5px 8px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    transition: border-color 0.2s, background 0.2s;
    z-index: 200;
    user-select: none;
  }
  #toggle-btn:hover {
    background: var(--bg3);
    border-color: rgba(245,201,122,0.55);
  }
  #toggle-btn .btn-icon { font-size: 15px; }
  #toggle-btn .btn-balance {
    background: rgba(245,201,122,0.12);
    border-radius: 99px;
    padding: 1px 7px;
    font-size: 12px;
  }

  /* ── PANEL PRINCIPAL ── */
  #shop-panel {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  #shop-panel.open {
    opacity: 1;
    pointer-events: all;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .header-title {
    font-family: var(--font);
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }
  .header-title span {
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 500;
    margin-left: 3px;
  }

  .balance-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(245,201,122,0.1);
    border: 1px solid rgba(245,201,122,0.2);
    border-radius: 99px;
    padding: 3px 9px;
    font-family: var(--font);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    transition: background 0.3s, border-color 0.3s;
  }
  .balance-pill.updated {
    background: rgba(245,201,122,0.22);
    border-color: rgba(245,201,122,0.5);
  }

  .close-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 99px;
    width: 24px; height: 24px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .close-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); }

  /* ── STATUS ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 5px var(--green);
    animation: blink 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  .status-dot.offline { background:#ff4455; box-shadow:0 0 5px #ff4455; animation:none; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── SCROLL AREA ── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  .scroll-area::-webkit-scrollbar { width: 3px; }
  .scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 7px;
  }

  .item-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 8px;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 5px;
    user-select: none;
  }
  .item-card:hover {
    border-color: rgba(245,201,122,0.3);
    background: var(--bg3);
    transform: translateY(-1px);
  }
  .item-card:active { transform: scale(0.97); }
  .item-card.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
  .item-card.buying { pointer-events: none; }

  .item-card.skeleton { pointer-events: none; cursor: default; }
  .item-card.skeleton::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease-in-out infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .item-img-wrap {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 7px;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .item-img {
    width: 75%; height: 75%;
    object-fit: contain;
    image-rendering: pixelated;
    transition: transform 0.2s;
  }
  .item-card:hover .item-img { transform: scale(1.08); }
  .item-img-placeholder { font-size: 26px; line-height: 1; }

  .item-name {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }
  .item-desc {
    font-size: 9px;
    font-weight: 600;
    color: var(--text-dim);
    line-height: 1.3;
  }

  .item-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1px;
  }
  .item-price {
    display: flex; align-items: center; gap: 3px;
    font-family: var(--font);
    font-size: 13px; font-weight: 700;
    color: var(--accent);
  }
  .item-price.cant-afford { color: #ff6677; }

  .item-btn {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; border-radius: 6px;
    padding: 3px 8px;
    font-family: var(--font); font-size: 10px; font-weight: 700;
    color: #1a1200;
    cursor: pointer;
    pointer-events: none;
  }

  /* Feedback overlay */
  .item-feedback {
    position: absolute; inset: 0;
    border-radius: var(--r);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font); font-size: 24px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .item-feedback.success {
    background: rgba(126,207,160,0.25); color: var(--green);
    opacity: 1; animation: feedbackPop 1.2s ease forwards;
  }
  .item-feedback.error {
    background: rgba(255,68,85,0.2); color: #ff6677;
    opacity: 1; animation: feedbackPop 1.2s ease forwards;
  }
  @keyframes feedbackPop {
    0%   { opacity:0; transform:scale(0.7); }
    20%  { opacity:1; transform:scale(1.1); }
    70%  { opacity:1; transform:scale(1.0); }
    100% { opacity:0; transform:scale(1.0); }
  }

  /* Skeleton pieces */
  .skel-img { width:100%; aspect-ratio:1; background:var(--bg3); border-radius:7px; }
  .skel-line { height:9px; background:var(--bg3); border-radius:99px; margin-top:5px; }
  .skel-line.short { width:55%; }

  /* ── LOGIN PROMPT ── */
  #login-prompt {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px;
    text-align: center;
    flex: 1;
  }
  #login-prompt .emoji { font-size: 28px; }
  #login-prompt p { font-size: 12px; color: var(--text-dim); line-height: 1.5; }
  #login-prompt button {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none; border-radius: 8px;
    padding: 7px 16px;
    font-family: var(--font); font-size: 13px; font-weight: 700;
    color: #1a1200; cursor: pointer;
    margin-top: 4px;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 10px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 5px 14px;
    font-family: var(--font); font-size: 12px; font-weight: 600;
    color: var(--text);
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    white-space: nowrap;
    z-index: 300;
    max-width: calc(100% - 20px);
    text-align: center;
    backdrop-filter: blur(8px);
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  #toast.success { border-color: rgba(126,207,160,0.4); color: var(--green); }
  #toast.error   { border-color: rgba(255,68,85,0.4);   color: #ff6677; }
</style>
</head>
<body>

<!-- Botón colapsado (visible cuando el panel está cerrado) -->
<div id="toggle-btn" onclick="openShop()">
  <span class="btn-icon">🏃</span>
  Tienda
  <span class="btn-balance" id="btn-balance">🪙 —</span>
</div>

<!-- Panel principal -->
<div id="shop-panel">
  <div class="header">
    <div class="header-left">
      <div class="header-title">🏃 Paquito <span>tienda</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <div class="balance-pill" id="balance-pill">
        <span>🪙</span>
        <span id="balance-value">—</span>
      </div>
      <button class="close-btn" onclick="closeShop()">✕</button>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Conectando...</span>
  </div>

  <div id="login-prompt">
    <span class="emoji">👋</span>
    <p>Inicia sesión con Twitch<br>para usar la tienda</p>
    <button onclick="Twitch.ext.actions.requestIdShare()">Iniciar sesión</button>
  </div>

  <div class="scroll-area" id="main-content" style="display:none">
    <div class="grid" id="items-grid">
      <div class="item-card skeleton"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
      <div class="item-card skeleton"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
      <div class="item-card skeleton"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
      <div class="item-card skeleton"><div class="skel-img"></div><div class="skel-line"></div><div class="skel-line short"></div></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const EBS_URL = 'https://b451-79-116-173-119.ngrok-free.app';

let twitchToken  = null;
let twitchUserId = null;
let balance      = null;
let items        = [];
let cooldowns    = {};
let authorized   = false;
let shopOpen     = false;

// ── PANEL TOGGLE ──────────────────────────────────────────────
function openShop() {
  shopOpen = true;
  document.getElementById('shop-panel').classList.add('open');
  document.getElementById('toggle-btn').style.display = 'none';
}
function closeShop() {
  shopOpen = false;
  document.getElementById('shop-panel').classList.remove('open');
  document.getElementById('toggle-btn').style.display = '';
}

// ── TWITCH EXT ────────────────────────────────────────────────
Twitch.ext.onAuthorized(auth => {
  twitchToken = auth.token;
  const payload = JSON.parse(atob(auth.token.split('.')[1]));
  const realUserId = payload.user_id;
  twitchUserId = realUserId || payload.opaque_user_id;

  if (!realUserId) {
    showLoginPrompt();
    return;
  }

  authorized = true;
  document.getElementById('login-prompt').style.display = 'none';
  document.getElementById('main-content').style.display = '';
  init();
});

Twitch.ext.onError(err => {
  setStatus('error', 'Error de conexión');
  console.error('[EXT]', err);
});

// ── INIT ──────────────────────────────────────────────────────
async function init() {
  setStatus('loading', 'Cargando...');
  await Promise.all([loadItems(), loadBalance()]);
  renderItems();
  setStatus('online', 'Tienda lista');
}

// ── API ───────────────────────────────────────────────────────
async function apiFetch(path, options = {}) {
  const res = await fetch(`${EBS_URL}${path}`, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${twitchToken}`,
      'ngrok-skip-browser-warning': 'true',
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

async function loadItems() {
  try {
    const data = await apiFetch('/extension/items');
    items = data.items || [];
  } catch (e) {
    console.error('[EXT] loadItems:', e.message);
    items = [];
  }
}

async function loadBalance() {
  try {
    const data = await apiFetch('/extension/balance');
    setBalance(data.balance ?? 0);
  } catch (e) {
    console.error('[EXT] loadBalance:', e.message);
    setBalance(0);
  }
}

async function buyItem(item) {
  const card = document.querySelector(`[data-id="${item.id}"]`);
  if (!card) return;

  if (cooldowns[item.id] && Date.now() < cooldowns[item.id]) {
    const secs = Math.ceil((cooldowns[item.id] - Date.now()) / 1000);
    showToast(`⏳ Espera ${secs}s`, 'error');
    return;
  }

  card.classList.add('buying');
  setStatus('loading', `Usando ${item.name}...`);

  try {
    const data = await apiFetch('/extension/use', {
      method: 'POST',
      body: JSON.stringify({ item_id: item.id }),
    });
    setBalance(data.balance);
    cooldowns[item.id] = Date.now() + (item.cooldown_ms || 3000);
    showFeedback(card, 'success', '✓');
    showToast(`✨ ¡${item.name} usado!`, 'success');
    setStatus('online', 'Tienda lista');
    setTimeout(loadBalance, 1500);
  } catch (e) {
    showFeedback(card, 'error', '✗');
    showToast(e.message || 'No se pudo usar', 'error');
    setStatus('online', 'Tienda lista');
  } finally {
    card.classList.remove('buying');
    updateAffordability();
  }
}

// ── RENDER ────────────────────────────────────────────────────
function renderItems() {
  const grid = document.getElementById('items-grid');

  if (!items.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--text-dim);font-size:12px">
      🛒 No hay ítems disponibles
    </div>`;
    return;
  }

  grid.innerHTML = items.map(item => {
    const canAfford = balance === null || balance >= item.price;
    return `
    <div class="item-card${canAfford ? '' : ' disabled'}" data-id="${item.id}" onclick="handleItemClick(${item.id})">
      <div class="item-img-wrap">
        ${item.image_url
          ? `<img class="item-img" src="${item.image_url}" alt="${item.name}" loading="lazy" />`
          : `<div class="item-img-placeholder">${item.icon || '🎁'}</div>`
        }
      </div>
      <div class="item-name">${item.name}</div>
      ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
      <div class="item-footer">
        <div class="item-price${canAfford ? '' : ' cant-afford'}">🪙 ${item.price}</div>
        <button class="item-btn">Usar</button>
      </div>
      <div class="item-feedback" id="feedback-${item.id}"></div>
    </div>`;
  }).join('');
}

function updateAffordability() {
  items.forEach(item => {
    const card = document.querySelector(`[data-id="${item.id}"]`);
    if (!card) return;
    const canAfford = balance === null || balance >= item.price;
    card.classList.toggle('disabled', !canAfford);
    const priceEl = card.querySelector('.item-price');
    if (priceEl) priceEl.classList.toggle('cant-afford', !canAfford);
  });
}

function handleItemClick(itemId) {
  const item = items.find(i => i.id === itemId);
  if (item) buyItem(item);
}

// ── UI HELPERS ────────────────────────────────────────────────
function setBalance(val) {
  balance = val;
  const formatted = val.toLocaleString('es-ES');
  document.getElementById('balance-value').textContent = formatted;
  document.getElementById('btn-balance').textContent = `🪙 ${formatted}`;
  const pill = document.getElementById('balance-pill');
  pill.classList.add('updated');
  setTimeout(() => pill.classList.remove('updated'), 600);
  updateAffordability();
}

function setStatus(type, text) {
  const dot  = document.getElementById('status-dot');
  const span = document.getElementById('status-text');
  span.textContent = text;
  dot.className = 'status-dot';
  if (type === 'error')   dot.classList.add('offline');
  if (type === 'loading') dot.style.background = '#f5c97a';
  else dot.style.background = '';
}

let _toastTimer = null;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 2500);
}

function showFeedback(card, type, symbol) {
  const el = document.getElementById(`feedback-${card.dataset.id}`);
  if (!el) return;
  el.textContent = symbol;
  el.className = `item-feedback ${type}`;
  setTimeout(() => { el.className = 'item-feedback'; }, 1300);
}

function showLoginPrompt() {
  document.getElementById('login-prompt').style.display = 'flex';
  document.getElementById('main-content').style.display = 'none';
  setStatus('error', 'No has iniciado sesión');
}
</script>
</body>
</html>
